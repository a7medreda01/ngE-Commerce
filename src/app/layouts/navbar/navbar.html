<div class="d-flex  bg-dark">
    <div class="bg-dark text-light text-center sale-div">{{topText}}<a routerLink="home" class="ms-3 text-light">
            ShopNow</a>
    </div>
    <!-- language -->
    <div class="dropdown text-light me-lg-5">
        <button class="btn bg-dark dropdown-toggle text-light" type="button" data-bs-toggle="dropdown"
            aria-expanded="false">
            {{ selectedOption || 'language' }}
        </button>
        <ul class="dropdown-menu text-light">
            <li *ngFor="let opt of options">
                <a class="dropdown-item" href="#" (click)="select(opt)">{{ opt }}</a>
            </li>
        </ul>
    </div>
</div>

<!-- ///navbar -->

<nav class="navbar navbar-expand-lg ">
    <div class="container d-flex gap-lg-5 container-nav">
        <!-- Brand / Title -->
        <div class="d-flex">
            <!-- Toggle button for mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand" href="#">Mattger</a>

        </div>


        <!-- Navbar links and content -->
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto d-none d-lg-flex   gap-3">
                <li class="nav-item"><a class="nav-link" routerLink="">Home</a></li>
                <li class="nav-item"><a class="nav-link" routerLink="contact">Contact</a></li>
                <li class="nav-item"><a class="nav-link" routerLink="about">About</a></li>
                <li class="nav-item"><a class="nav-link" routerLink="register">Join</a></li>
            </ul>

            <!-- Search input -->
            <div class="position-relative d-none d-lg-flex ">
                <input type="text" class="form-control pe-5" placeholder="What are you looking for ?">
                <i class="bi bi-search position-absolute top-50 end-0 translate-middle-y me-3 text-muted"></i>
            </div>


        </div>

        <!-- Favorite & Cart icons -->
        <div class="d-flex align-items-center">
            <a class="btn icon d-lg-none" (click)="toggleSearch()"><i class="bi bi-search"></i>
            </a>

            <a class="btn icon mx-lg-2 mt-1" routerLink="wishlist"><i class="bi bi-heart">
                    <p class="length">{{wishLength}}</p>
                </i></a>
            <a class="btn icon " routerLink="cart"><i class="bi bi-cart"></i>
                <p class="length">{{cartLength}}</p>
            </a>

            <a class="btn icon profileicon" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person fs-4"></i>
            </a>

            <ul class="dropdown-menu dropdown-menu-end profile-dropdown nox" aria-labelledby="profileDropdown">
                <li>
                    <a class="dropdown-item" routerLink="account">
                        <i class="bi bi-person-circle me-2"></i> Account
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" routerLink="/account/my-orders">
                        <i class="bi bi-bag me-2"></i> Orders
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" routerLink="/account/payment">
                        <i class="bi bi-credit-card me-2"></i> Payment
                    </a>
                </li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li>
                    <a class="dropdown-item" href="#" (click)="logout()">
                        <i class="bi bi-box-arrow-right me-2"></i> Log Out
                    </a>
                </li>
            </ul>
        </div>


    </div>
</nav>
<!-- Search input -->
<div class="position-relative d-lg-none m-2 search-bar" *ngIf="showSearch">
    <input type="text" class="form-control pe-5" placeholder="What are you looking for ?">
    <i class="bi bi-search position-absolute top-50 end-0 translate-middle-y me-3 text-muted"></i>
</div>

<!-- Navbar links and content -->
<div class="collapse navbar-collapse  d-lg-none " id="navbarContent">
    <ul class="navbar-nav me-auto  mobile-menu gap-1">
        <li class="nav-item"><a class="nav-link" routerLink="">Home</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="contact">Contact</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="about">About</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="register">Join</a></li>
    </ul>

</div>
