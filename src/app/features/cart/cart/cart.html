<div class="container my-5">

    <!-- //router-Link -->
    <div>
        <div class="d-flex gap-2"><a routerLink="" class="homeLink">Home </a>
            <p>/ Cart</p>
        </div>
    </div>

    <!-- items  -->
    <app-cart-items [products]="products"></app-cart-items>
    <!-- end of items  -->

    <div class="my-4 d-flex justify-content-between ">
        <button class="btn  btn-move p-2 px-lg-4">Return To Shop</button>
        <button class="btn  btn-move p-2 px-lg-4">Update Cart</button>
    </div>

    <div class="my-4 mt-5 d-flex flex-column flex-md-row justify-content-between mt-5 gap-5">
        <div class="d-flex gap-2 flex-column flex-md-row col-md-6">
            <input type="text" placeholder="Coupon Code" class="coupon-input col-lg-7 ">
            <button class="btn border btn-coupon p-2 px-lg-4 col-lg-4">Apply Coupon</button>
        </div>
        <div class="total-div col-12 col-md-6">
            <h5 class="mb-5">Cart Total</h5>
            <div class="d-flex justify-content-between">
                <p>SubTotal :</p>
                <p>1980$</p>
            </div>
            <hr>
            <div class="d-flex justify-content-between">
                <p>Shipping :</p>
                <p>Free</p>
            </div>
            <hr class="m-3">
            <div class="d-flex justify-content-between">
                <h4>Total :</h4>
                <h4>1980$</h4>
            </div>
            <div class="d-flex justify-content-center">
            <a class="btn border btn-coupon p-2 px-lg-4 mt-3 " routerLink="checkOut">Proccess To Check</a>
            </div>            
        </div>
    </div>

</div>
