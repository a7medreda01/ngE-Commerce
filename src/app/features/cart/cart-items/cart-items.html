<table class="cart-table">
    <thead>
        <tr class="table-header">
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
        </tr>
    </thead>
    <tbody>
        @for(product of products; track product){
        <tr>
            <!-- Product Name + Image -->
            <td class="product-cell">
                <div class="img-wrapper">
                    <img [src]="product.image" alt="" class="img" width="50" />
                    <a href="#" class="remove-btn">
                        <i class="bi bi-x-circle-fill"></i>
                    </a>
                </div>
                {{ product.name }}
            </td>
            <!-- Price -->
            <td>{{ product.price | currency:'USD' }}</td>

            <!-- Quantity Input -->
            <td>
                <input type="number" class="form-control quantity-input" [(ngModel)]="product.quantity" min="1"
                    style="width: 60px;" />
            </td>

            <!-- Subtotal -->
            <td>{{ product.price * product.quantity | currency:'USD' }}</td>
        </tr>
        }
    </tbody>
</table>
