<div class="d-flex flex-column container my-5  ">
    <div class="d-flex justify-content-between align-content-center">
        <h5 class="align-content-center">WishList ({{length}})</h5>
        <button class="btn border btn-move p-2 px-lg-4" (click)="moveToCart()">Move All To Bag</button>
    </div>

    <!-- //items  -->
    <div class="d-flex gap-4 flex-wrap my-5 justify-content-center align-content-center">
     @for(product of wishlistItems$ | async ; track product){
     <app-product-card [product]="product.product" class="col-5 col-md-2"></app-product-card>
     }
    </div>
    
</div>
