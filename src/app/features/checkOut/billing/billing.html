<form  class="col-12 " [formGroup]="orderForm" (ngSubmit)="createOrder()">
    <div class="d-flex flex-column input-bill">
        <label for="name"  id="name"  >Name</label>
        <input class="input" type="text" id="name" formControlName="name">
    </div>
    <div class="d-flex flex-column input-bill">
        <label for="company">Company Name (optional)</label>
        <input class="input" type="text" id="company" id="company" formControlName="company" >
    </div>
    <div class="d-flex flex-column input-bill">
        <label for="address">Street Adress</label>
        <input class="input" type="text" id="address" formControlName="address">
    </div>
    <div class="d-flex flex-column input-bill">
        <label for="appartment">Appartment, floor, etc (optional)</label>
        <input class="input" type="text" id="appartment" formControlName="appartment">
    </div>
    <div class="d-flex flex-column input-bill">
        <label for="city">Town/City</label>
        <input class="input" type="text" id="city" formControlName="city">
    </div>
    <div class="d-flex flex-column input-bill">
        <label for="phone">Phone Number</label>
        <input class="input" type="text" id="phone" formControlName="phone">
    </div>
    <!-- <div class="d-flex flex-column input-bill">
        <label for="email">Email Address</label>
        <input class="input" type="text" id="email" formControlName="email">
    </div> -->
    <div class="d-flex gap-2 ">
        <input type="checkbox" name="save-info" id="save-info">
        <label for="save-info">Save this information for faster check-out next time</label>
    </div>
            <button type="submit" class="btn border btn-coupon p-2 my-3 px-lg-4 col-lg-4" >Place Order</button>
    
</form>
