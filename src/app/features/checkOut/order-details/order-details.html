<div class="col-12">
    @for(product of items.items ; track product)
    {
    <div class="d-flex justify-content-between p-3">
        <div class="d-flex gap-2 align-items-center">
            <img [src]="product.pictureUrl" alt="" class="product-img">
            <h6 class="ms-3">{{product.productName}}</h6>
        </div>
        <h6>{{ product.totalPrice |  currency:'USD'}}</h6>

    </div>
    }
    <div class="d-flex flex-column p-3">
        <div class="mt-3 d-flex justify-content-between">
            <h6>SubTotal :</h6>
            <h6>{{items.totalPrice}}$</h6>
        </div>
        <hr>
        <div class=" d-flex justify-content-between">
            <h6>Shipping :</h6>
            <h6>Free</h6>
        </div>
        <hr>
        <div class=" d-flex justify-content-between">
            <h4>Total :</h4>
            <h4>{{items.totalPrice}}$</h4>
        </div>
    </div>
    <div>
        <form>

            <!-- Bank -->
            <div class="payment-option">
                <input type="radio" id="bank" name="payment" />
                <label for="bank">
                    <i class="bi bi-bank2"></i>
                    Bank
                </label>
            </div>

            <!-- Cash -->
            <div class="payment-option">
                <input type="radio" id="cash" name="payment" />
                <label for="cash">
                    <i class="bi bi-cash-coin"></i>
                    Cash On Delivery
                </label>
            </div>

        </form>
    </div>


</div>
