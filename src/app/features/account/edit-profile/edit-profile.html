<div class="edit-parent-div  p-3">
    <h4 class="mb-3 edit">Edit Your Profile</h4>

    <form>
        <div class="d-flex justify-content-between gap-1 gap-lg-5 flex-column flex-lg-row">
            <div class="mb-3 w-100">
                <label>First Name</label>
                <input type="text" class="form-control form-input" placeholder="Ah">
            </div>

            <div class="mb-3 w-100">
                <label>Last Name</label>
                <input type="email" class="form-control form-input" placeholder="Mo">
            </div>
        </div>

        <div class="d-flex justify-content-between gap-1 gap-lg-5 flex-column flex-lg-row">
            <div class="mb-3 w-100">
                <label>Email</label>
                <input type="text" class="form-control form-input" placeholder="ah@example.com">
            </div>

            <div class="mb-3 w-100">
                <label>Address</label>
                <input type="email" class="form-control form-input" placeholder="10 ex ,eg">
            </div>
        </div>


        <div class="d-flex flex-column gap-1 mt-3">
            <div class="mb-3 w-100">
                <label>Change Password</label>
                <input type="text" class="form-control form-input" placeholder="Current">
            </div>

            <div class="mb-3 w-100">
                <input type="email" class="form-control form-input" placeholder="New">
            </div>
            <div class="mb-3 w-100">
                <input type="email" class="form-control form-input" placeholder="Confairm New">
            </div>
        </div>
        <div class="text-end">
            <a class="btn p-3 m-2" id="">Cancel</a>
            <a class="btn" id="save-changes-btn">Save Changes</a>
        </div>

    </form>
</div>
