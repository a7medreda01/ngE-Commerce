<div class="container my-4">
  <h4 class="title">My Cancelled Orders</h4>

  <div class="order-card mb-4 shadow-sm"
       *ngFor="let order of cancelledOrders">

    <!-- 🔹 Header -->
    <div class="order-header d-flex justify-content-between flex-wrap">

      <div>
        <small>ORDER PLACED</small><br>
        <strong>{{ order.date }}</strong>
      </div>

      <div>
        <small>TOTAL</small><br>
        <strong>$ {{ getTotal(order) }}</strong>
      </div>

      <div>
        <small>STATUS</small><br>
        <span class="badge bg-danger">
            Cancelled
        </span>
      </div>

      <div>
        <small>ORDER ID</small><br>
        <strong>#{{ order.id }}</strong>
      </div>

    </div>

    <!-- 🔹 Body -->
    <div class="order-body d-flex justify-content-between align-items-center flex-wrap">

      <!-- 🧾 Items -->
      <div class="order-items">
        <div *ngFor="let item of order.items">
          {{ item.name }} × {{ item.quantity }}
        </div>
      </div>

      <!-- 🎯 Actions -->
      <div class="order-actions text-end mt-3 mt-md-0">
        <button class="btn btn-outline-secondary btn-sm me-2">
          View Details
        </button>

        <button class="btn btn-danger btn-sm">
          Reorder
        </button>
      </div>

    </div>

  </div>

  <!-- ❌ لو مفيش -->
  <div *ngIf="cancelledOrders.length === 0" class="text-center text-muted mt-5">
    No cancelled orders
  </div>
</div>
