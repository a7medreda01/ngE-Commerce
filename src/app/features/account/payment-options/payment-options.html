<div class="container d-flex justify-content-between flex-column flex-lg-row w-100">

  <!-- add  -->
  <div class="">

    <!-- Card Type Icons -->
    <div class="d-flex gap-3 mb-3">
      <img src="https://img.icons8.com/color/48/visa.png" width="50" />
      <img src="https://img.icons8.com/color/48/mastercard-logo.png" width="50" />
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/PayPal_Logo2014.png" width="50" />
    </div>

    <!-- 💳 CARD PREVIEW -->
    <div class="card-preview" [class.flip]="isFlipped">

      <!-- Front -->
      <div class="card front" [ngStyle]="{'background': getCardColor(cardType)}">

        <div class="d-flex justify-content-between text-center align-items-center">
          <div class="d-flex">
            <img [src]="cardIcon" width="50" *ngIf="cardIcon" />
            <p class="m-0 d-flex ms-2 align-items-center">{{ cardType }}</p>
          </div>
          <span class="text-warning">
            <i class="bi bi-credit-card-fill"></i>
          </span>
        </div>

        <h5 class="mt-4">{{ cardNumber || '#### #### #### ####' }}</h5>

        <div class="d-flex justify-content-between mt-4">
          <div>
            <small>Card Holder</small>
            <div>{{ cardHolder || 'YOUR NAME' }}</div>
          </div>
          <div>
            <small>Expires</small>
            <div>{{ expiry || 'MM/YY' }}</div>
          </div>
        </div>
      </div>

      <!-- Back -->
      <div class="card back">
        <div class="strip"></div>
        <div class="cvv-box">
          {{ cvv || '***' }}
        </div>
      </div>
    </div>

    <!-- 📝 FORM -->
    <form class="mt-4">

      <input class="form-control mb-2" placeholder="Card Number" [value]="cardNumber" (input)="onCardNumber($event)">

      <input class="form-control mb-2" placeholder="Card Holder" [value]="cardHolder"
        (input)="cardHolder = $any($event.target).value">

      <div class="row">
        <div class="col">
          <input class="form-control form-control2 mb-2" placeholder="MM/YY" [value]="expiry"
            (input)="onExpiryInput($event)">
        </div>

        <div class="col">
          <input class="form-control form-control2 mb-2" placeholder="CVV" [value]="cvv" (focus)="isFlipped = true"
            (blur)="isFlipped = false" (input)="cvv = $any($event.target).value">
        </div>
      </div>

      <button type="button" class="btn btn-danger w-100" (click)="addCard()">
        Save Card
      </button>

    </form>
  </div>

  <!-- 💾 SAVED CARDS -->
  <div class="mt-4">

    @if(savedCards.length > 0){
    <h6>Saved Cards</h6>
    }

    <div class="saved-card" *ngFor="let c of savedCards">

      <div class="d-flex flex-row">
        <!-- icon -->
        <img [src]="getCardIcon(c.cardType)" width="50" class="mx-2" />

        <!-- data -->
        <div class="d-flex flex-column">

          <h6 class="p-0 m-0">{{ c.cardType }} - **** {{ c.cardNumber.slice(-4) }} </h6>
          <p class="p-0 m-0 text-muted">**** {{c.cardName.slice(3)}}</p>

        </div>
      </div>
      <a (click)="deleteCard(c.id)" class="text-danger">
        <i class="bi bi-x-circle m-2 ms-5"></i>
      </a>

    </div>

  </div>

</div>
