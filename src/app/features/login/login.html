<div class="container mt-5">
    <div class="d-flex  flex-row-reverse">
        <img src="assets/icons/login.jpg" class="img-fluid img-register">
        <div class="form ">
            <h1>Login To Exclusive</h1>
            <p class="mb-4">Enter your details below</p>
            <form action="">
                <input type="email" placeholder="Email" class="input">
                <input type="password" placeholder="Password" class="input">
                <div class="d-flex gap-2 align-items-center justify-content-between login-forget">
                    <button type="submit" class="btn btn create">Login</button>
                    <a href="" class="forget">Forget Password ?</a>
                </div>
            </form>

            <!-- social register  -->
            <div class="social-login">
                <p class="divider">
                    <span>or Continue with</span>
                </p>

                <button class="btn social-btn google">
                    <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="google">
                    Google
                </button>

                <button class="btn social-btn apple">
                    <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="apple">
                    Apple
                </button>
            </div>
            <div class="py-3 mx-3">
                <h6>Don`t Have An Account ? <a href="" routerLink="/register">Register</a></h6>
            </div>
        </div>
    </div>
</div>
