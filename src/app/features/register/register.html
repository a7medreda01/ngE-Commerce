<div class="container mt-5 ">
    <div class="d-flex gap-5 flex-column flex-md-row">
        <img src="assets/icons/login.jpg" class="img-fluid img-register">
        <div class="form ">
            <h1>Create An Account</h1>
            <p class="mb-4">Enter your details below</p>
            <form action="">
                <input type="text" placeholder="Name" class="input">
                <input type="email" placeholder="Email" class="input">
                <input type="password" placeholder="Password" class="input">
                <input type="password" placeholder="Confairm Password" class="input">
                <button type="submit" class="btn btn create">Create Account</button>
            </form>

            <!-- social register  -->
            <div class="social-login">
                <p class="divider">
                    <span>or join with</span>
                </p>

                <button class="btn social-btn google">
                    <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="google">
                    Continue with Google
                </button>

                <button class="btn social-btn apple">
                    <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="apple">
                    Continue with Apple
                </button>
            </div>
            <div class="py-3">
                <h6>Already Have An Account ? <a href="" routerLink="/login">Login</a></h6>
            </div>
        </div>
    </div>
</div>
